<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRFC</title>

<style>

:root{
--bg:#07111f;
--panel:#132238;
--panel2:#1a2d46;
--border:#28415f;
--text:#ffffff;
--soft:#9fb3c8;
--green:#10b981;
--shadow:rgba(0,0,0,.25);
}

/* ===== LIGHT MODE PREMIUM ===== */

body.light-mode{
--bg:#dbe7f3;
--panel:#edf4fb;
--panel2:#e2edf8;
--border:#b7c9dc;
--text:#102033;
--soft:#5f7288;
--green:#10b981;
--shadow:rgba(15,23,42,.06);
}

body.light-mode .logo-box,
body.light-mode .datetime-box,
body.light-mode .mini-btn,
body.light-mode .search-box input,
body.light-mode .semaforo,
body.light-mode .card,
body.light-mode .tool-btn,
body.light-mode .action,
body.light-mode .section,
body.light-mode .result-card{
background:
linear-gradient(
180deg,
rgba(255,255,255,.98),
rgba(231,239,248,.97)
) !important;

color:#102033 !important;

border:1px solid rgba(59,130,246,.16) !important;

box-shadow:
0 0 8px rgba(59,130,246,.05),
0 3px 8px rgba(15,23,42,.05) !important;
}

/* LINEAS HUD */

body.light-mode .logo-box::before,
body.light-mode .card::before,
body.light-mode .tool-btn::before,
body.light-mode .action::before,
body.light-mode .section::before,
body.light-mode .result-card::before{
background:
linear-gradient(
90deg,
transparent,
rgba(59,130,246,.55),
transparent
);
}

/* RELOJ */

body.light-mode .hud-clock{
color:#2563eb;

text-shadow:
0 0 8px rgba(59,130,246,.15);
}

body.light-mode .hud-date{
color:#64748b;
}

/* PLACEHOLDER */

body.light-mode .search-box input::placeholder{
color:#64748b;
}

/* TARJETAS */

body.light-mode .card{
background:
linear-gradient(
180deg,
rgba(248,252,255,.98),
rgba(226,236,246,.96)
) !important;
}

body.light-mode .card.inactive{
opacity:.88;
}

body.light-mode .card.active{

background:
linear-gradient(
180deg,
rgba(16,185,129,.10),
rgba(255,255,255,.96)
) !important;

border:1px solid rgba(16,185,129,.35) !important;

box-shadow:
0 0 8px rgba(16,185,129,.10),
0 3px 8px rgba(15,23,42,.05) !important;
}

/* HOVERS */

body.light-mode .card:hover,
body.light-mode .tool-btn:hover,
body.light-mode .action:hover,
body.light-mode .mini-btn:hover{

border-color:
rgba(59,130,246,.35) !important;

box-shadow:
0 0 10px rgba(59,130,246,.10),
0 3px 8px rgba(15,23,42,.06) !important;
}

/* RESULTADOS */

body.light-mode .result-card span{
color:#10b981;
}

/* SELECT */

body.light-mode select{

background:
linear-gradient(
180deg,
rgba(255,255,255,.96),
rgba(231,239,248,.97)
);

color:#102033;

border:1px solid rgba(59,130,246,.16);
}

/* BASE */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:Arial,sans-serif;
padding:12px;
transition:.25s;
}

.logo-box,
.datetime-box,
.mini-btn,
.search-box input,
.semaforo,
.card,
.tool-btn,
.action,
.section,
.result-card{
backdrop-filter:blur(6px);
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}

/* LOGO */

.logo-box{
position:relative;
display:flex;
align-items:center;
gap:10px;

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.98)
);

padding:10px;

border-radius:16px;

border:1px solid rgba(56,189,248,.12);

transition:.25s;

overflow:hidden;

box-shadow:
0 0 8px rgba(56,189,248,.08),
0 3px 8px var(--shadow);
}

.logo-box::before,
.card::before,
.tool-btn::before,
.action::before,
.section::before,
.result-card::before{
content:'';

position:absolute;

top:0;
left:15%;

width:70%;
height:1px;

background:
linear-gradient(
90deg,
transparent,
rgba(56,189,248,.8),
transparent
);
}

.logo-icon{
width:52px;
height:52px;
border-radius:14px;
background:linear-gradient(135deg,#10b981,#3b82f6);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
color:white;
}

.logo-text h1{
font-size:20px;
}

.logo-text p{
font-size:10px;
opacity:.7;
}

/* TOP ACTIONS */

.top-actions{
display:flex;
gap:6px;
align-items:center;
flex-wrap:wrap;
}

/* RELOJ */

.datetime-box{
min-width:120px;
padding:8px 12px;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:2px;

background:
linear-gradient(
180deg,
rgba(20,35,55,.95),
rgba(8,15,28,.95)
);

border:1px solid rgba(56,189,248,.12);

box-shadow:
0 0 8px rgba(59,130,246,.12),
0 3px 8px var(--shadow);

transition:.25s;
}

.hud-clock{
font-size:24px;
font-weight:700;
letter-spacing:2px;
color:#7dd3fc;

text-shadow:
0 0 8px rgba(125,211,252,.45);

line-height:1;
}

.hud-date{
font-size:10px;
letter-spacing:1px;
color:#9fb3c8;
}

/* MINI BUTTONS */

.mini-btn{

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.98)
);

width:34px;
height:34px;

border-radius:10px;

display:flex;
align-items:center;
justify-content:center;

border:1px solid rgba(56,189,248,.12);

font-size:12px;
cursor:pointer;

flex-shrink:0;

transition:.2s;

box-shadow:
0 0 8px rgba(56,189,248,.08),
0 2px 6px var(--shadow);
}

.mini-btn:hover{

border-color:rgba(56,189,248,.45);

box-shadow:
0 0 10px rgba(56,189,248,.10),
0 0 18px rgba(56,189,248,.04);

transform:translateY(-1px);
}

/* SEARCH */

.search-row{
display:flex;
gap:8px;
margin-bottom:8px;
align-items:center;
}

.search-box{
flex:1;
}

.search-box input{
width:100%;
padding:10px;

border:none;
border-radius:12px;

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.98)
);

color:var(--text);

outline:none;

border:1px solid rgba(56,189,248,.12);

transition:.25s;

box-shadow:
0 0 8px rgba(56,189,248,.08),
0 3px 8px var(--shadow);
}

.search-box input::placeholder{
color:var(--soft);
}

/* SEMAFORO */

.semaforo{
display:flex;
align-items:center;
gap:6px;

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.98)
);

padding:8px 10px;

border-radius:12px;

border:1px solid rgba(56,189,248,.12);

transition:.25s;

box-shadow:
0 0 8px rgba(56,189,248,.08),
0 3px 8px var(--shadow);
}

.luz{
width:14px;
height:14px;
border-radius:50%;
opacity:.25;
}

.luz.active{
opacity:1;
}

.rojo{background:#ef4444;}
.amarillo{background:#facc15;}
.verde{background:#22c55e;}

/* GRID */

.grid{
display:flex;
gap:8px;
margin-bottom:10px;
overflow:hidden;
}

/* CARDS */

.card{
position:relative;

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.96)
);

border-radius:16px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

cursor:pointer;

transition:.28s;

overflow:hidden;

border:1px solid rgba(56,189,248,.12);

height:60px;
min-width:60px;
flex:1;

box-shadow:
0 0 8px rgba(56,189,248,.08),
0 3px 8px var(--shadow);
}

.card:hover{

transform:translateY(-2px);

border-color:rgba(56,189,248,.45);

box-shadow:
0 0 10px rgba(56,189,248,.10),
0 0 18px rgba(56,189,248,.04),
0 3px 8px var(--shadow);
}

.card span{
font-size:20px;
}

.card h3{
font-size:10px;
font-weight:normal;
margin-top:4px;
white-space:nowrap;
}

.card.active{

border:1px solid rgba(16,185,129,.65);

background:
linear-gradient(
180deg,
rgba(16,185,129,.12),
rgba(20,35,55,.96)
);

box-shadow:
0 0 10px rgba(16,185,129,.18),
0 0 18px rgba(16,185,129,.05),
0 3px 8px var(--shadow);

opacity:1;
flex:2.4;
}

.card.inactive{
opacity:.45;
flex:.8;
}

.card.inactive h3{
display:none;
}

.card.inactive span{
font-size:16px;
}

/* ACTIONS */

.actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-bottom:10px;
}

.tool-btn,
.action{
position:relative;

height:40px;

display:flex;
align-items:center;
justify-content:center;

border-radius:12px;

font-size:12px;

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.96)
);

border:1px solid rgba(56,189,248,.12);

cursor:pointer;

transition:.25s;

overflow:hidden;

box-shadow:
0 0 8px rgba(56,189,248,.08),
0 3px 8px var(--shadow);
}

.tool-btn:hover,
.action:hover{

transform:translateY(-1px);

border-color:rgba(56,189,248,.45);

box-shadow:
0 0 10px rgba(56,189,248,.10),
0 0 18px rgba(56,189,248,.04);
}

/* PANEL */

.section{
position:relative;

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.98)
);

padding:16px;

border-radius:18px;

margin-bottom:10px;

min-height:48vh;

border:1px solid rgba(56,189,248,.12);

transition:.25s;

box-shadow:
0 0 8px rgba(56,189,248,.08),
0 4px 12px var(--shadow);

overflow:hidden;
}

.section h2{
margin-bottom:14px;
font-size:18px;
}

select{
width:100%;
padding:12px;
margin-bottom:10px;

border:none;
border-radius:12px;

background:
linear-gradient(
180deg,
rgba(26,45,70,.96),
rgba(16,28,45,.98)
);

color:var(--text);

outline:none;

border:1px solid rgba(56,189,248,.12);
}

/* COLORS */

.save{color:#10b981;border-color:#10b981;}
.edit{color:#facc15;border-color:#facc15;}
.clear{color:#ef4444;border-color:#ef4444;}
.excel{color:#60a5fa;border-color:#2563eb;}

/* RESULTS */

.results-panel{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.result-card{
position:relative;

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.98)
);

border:1px solid rgba(56,189,248,.12);

border-radius:16px;

padding:10px;

text-align:center;

transition:.25s;

overflow:hidden;

box-shadow:
0 0 8px rgba(56,189,248,.08),
0 3px 8px var(--shadow);
}

.result-card:hover{

transform:translateY(-2px);

border-color:rgba(56,189,248,.45);

box-shadow:
0 0 10px rgba(56,189,248,.10),
0 0 18px rgba(56,189,248,.04);
}

.result-card h4{
font-size:10px;
font-weight:normal;
opacity:.7;
margin-bottom:5px;
}

.result-card span{
font-size:15px;
font-weight:bold;
color:#22c55e;
}

/* MOBILE */

@media(max-width:900px){

.actions,
.results-panel{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

</body>
</html>
