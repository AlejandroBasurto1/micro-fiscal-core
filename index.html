<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRFC - Micro Real Fiscal Core</title>

<style>

body{
background:#07111f;
color:white;
font-family:Arial;
padding:12px;
margin:0;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.top-actions{
display:flex;
gap:6px;
align-items:center;
}

.mini-btn{
width:34px;
height:34px;
border-radius:10px;
background:#132238;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #28415f;
font-size:12px;
cursor:pointer;
transition:.2s;
}

.mini-btn:hover{
background:#1d3557;
}

/* FECHA */

.datetime-box{
display:flex;
flex-direction:column;
justify-content:center;
font-size:10px;
background:#132238;
padding:6px 10px;
border-radius:10px;
border:1px solid #28415f;
}

/* LOGO */

.logo-box{
display:flex;
align-items:center;
gap:10px;
background:#132238;
padding:10px;
border-radius:16px;
border:1px solid #1d3557;
}

.logo-icon{
width:52px;
height:52px;
border-radius:14px;
background:linear-gradient(135deg,#10b981,#3b82f6);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
}

.logo-text h1{
margin:0;
font-size:20px;
}

.logo-text p{
margin:2px 0 0 0;
font-size:10px;
opacity:.7;
}

/* BUSCADOR */

.search-row{
display:flex;
gap:8px;
margin-bottom:8px;
}

.search-box{
flex:1;
}

.search-box input{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#132238;
color:white;
box-sizing:border-box;
}

/* SEMAFORO */

.semaforo{
display:flex;
align-items:center;
gap:6px;
background:#132238;
padding:8px 10px;
border-radius:12px;
}

.luz{
width:14px;
height:14px;
border-radius:50%;
opacity:.3;
}

.luz.active{
opacity:1;
}

.rojo{background:#ef4444;}
.amarillo{background:#facc15;}
.verde{background:#22c55e;}

/* GRIDS */

.grid{
display:grid;
grid-template-columns:repeat(4,minmax(70px,1fr));
gap:6px;
margin-bottom:8px;
}

/* MODULOS */

.card{
background:#132238;
border-radius:10px;
padding:4px;
height:44px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:9px;
opacity:.45;
transition:.2s;
cursor:pointer;
overflow:hidden;
}

.card span{
font-size:14px;
}

.card h3{
margin:0;
font-size:9px;
}

.card.active{
opacity:1;
box-shadow:0 0 10px rgba(16,185,129,.18);
}

.card.hidden{
width:42px;
min-width:42px;
height:44px;
padding:2px;
opacity:.9;
}

.card.hidden h3{
display:none;
}

/* HERRAMIENTAS */

.tool-btn{
height:32px;
display:flex;
align-items:center;
justify-content:center;
background:#132238;
border-radius:10px;
font-size:11px;
border:1px solid #28415f;
color:#cbd5e1;
}

/* PANEL */

.section{
background:#132238;
padding:15px;
border-radius:16px;
margin-bottom:8px;
min-height:320px;
}

/* SELECT */

select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#1b2f4a;
color:white;
}

/* TAGS */

.tag{
display:inline-block;
padding:6px 10px;
background:#1b2f4a;
border-radius:10px;
margin:4px;
font-size:12px;
}

/* BOTONES */

.actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-bottom:8px;
}

.action{
height:32px;
display:flex;
align-items:center;
justify-content:center;
background:#132238;
border-radius:10px;
font-size:11px;
border:1px solid #28415f;
}

.save{color:#10b981;border-color:#10b981;}
.edit{color:#facc15;border-color:#facc15;}
.clear{color:#ef4444;border-color:#ef4444;}
.excel{color:#60a5fa;border-color:#2563eb;}

@media(max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

.actions{
grid-template-columns:repeat(2,1fr);
}

.topbar{
flex-wrap:wrap;
}

}

</style>

</head>
<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo-box">
<div class="logo-icon">MR</div>

<div class="logo-text">
<h1>MRFC</h1>
<p>MICRO REAL FISCAL CORE</p>
</div>
</div>

<div class="top-actions">

<div class="datetime-box">
<div id="fechaActual">📅 --/--/----</div>
<div id="horaActual">⏰ --:--</div>
</div>

<div class="mini-btn">🏠</div>
<div class="mini-btn">⬅️</div>
<div class="mini-btn">➡️</div>
<div class="mini-btn" onclick="abrirCalculadora()">🧮</div>

</div>

</div>

<!-- BUSCADOR -->

<div class="search-row">

<div class="search-box">
<input type="text" id="buscador" placeholder="🔍 Buscar módulo..." onkeyup="buscarModulo()">
</div>

<div class="semaforo">
<div class="luz rojo active"></div>
<div class="luz amarillo"></div>
<div class="luz verde"></div>
</div>

</div>

<!-- OPERACION -->

<div class="grid" id="grupoOperacion">

<div class="card active" data-nombre="actividad">
<span>💼</span>
<h3>Actividad</h3>
</div>

<div class="card" data-nombre="bancos">
<span>🏦</span>
<h3>Bancos</h3>
</div>

<div class="card" data-nombre="gastos">
<span>💸</span>
<h3>Gastos</h3>
</div>

<div class="card" data-nombre="viaticos">
<span>🚚</span>
<h3>Viáticos</h3>
</div>

</div>

<!-- APOYO -->

<div class="grid" id="grupoSecundario">

<div class="card" data-nombre="cliente">
<span>👥</span>
<h3>Cliente</h3>
</div>

<div class="card" data-nombre="proveedor">
<span>📦</span>
<h3>Proveedor</h3>
</div>

<div class="card" data-nombre="rutas">
<span>📍</span>
<h3>Rutas</h3>
</div>

<div class="card" data-nombre="mantenimiento">
<span>🛠️</span>
<h3>Mantenimiento</h3>
</div>

</div>

<!-- HERRAMIENTAS -->

<div class="actions">

<div class="tool-btn">📷 OCR</div>
<div class="tool-btn">🔳 QR</div>
<div class="tool-btn">📦 Código</div>
<div class="tool-btn">📍 GPS</div>

</div>

<!-- VENTANA CENTRAL -->

<div class="section">

<h2>⚙️ Operación del Día</h2>

<select id="actividadFiscal">

<option value="">Selecciona actividad fiscal</option>

<option value="GENERAL">GENERAL / UNIVERSAL</option>
<option value="PFAE">PFAE</option>
<option value="RESICO">RESICO</option>
<option value="RIF">RIF</option>
<option value="SUSA">SUSA</option>

</select>

<select id="operacion">

<option value="">Selecciona operación</option>

</select>

<div id="modoActual"></div>

<div id="modulosActivos"></div>

</div>

<!-- BOTONES -->

<div class="actions">

<div class="action save">💾 Guardar</div>

<div class="action edit">✏️ Editar</div>

<div class="action clear">🗑️ Limpiar</div>

<div class="action excel">📤 Exportar</div>

</div>

<script>

const tarjetas =
document.querySelectorAll(
'#grupoOperacion .card, #grupoSecundario .card'
);

tarjetas.forEach(card=>{

card.addEventListener('click',()=>{

tarjetas.forEach(c=>{
c.classList.remove('active');
c.classList.remove('hidden');
});

card.classList.add('active');

tarjetas.forEach(c=>{
if(c!==card){
c.classList.add('hidden');
}
});

});

});

const operaciones = {

GENERAL:[
'Personal',
'Universal'
],

PFAE:[
'Distribución',
'Instalación',
'Servicio',
'Venta'
],

RESICO:[
'Distribución',
'Servicio',
'Venta'
],

RIF:[
'General',
'Venta'
],

SUSA:[
'Alimentos',
'Hotel',
'Transporte',
'Viáticos'
]

};

document
.getElementById('actividadFiscal')
.addEventListener('change',function(){

const valor = this.value;

const selectOperacion =
document.getElementById('operacion');

selectOperacion.innerHTML =
'<option value="">Selecciona operación</option>';

if(operaciones[valor]){

operaciones[valor]
.sort()
.forEach(op=>{

selectOperacion.innerHTML +=
`<option>${op}</option>`;

});

}

});

function actualizarFechaHora(){

const ahora = new Date();

document.getElementById('fechaActual').innerText =
'📅 '+ahora.toLocaleDateString('es-MX');

document.getElementById('horaActual').innerText =
'⏰ '+ahora.toLocaleTimeString('es-MX',{
hour:'2-digit',
minute:'2-digit'
});

}

function abrirCalculadora(){

const valor = prompt('Calculadora rápida');

if(valor){

try{
alert(eval(valor));
}catch(e){
alert('Operación inválida');
}

}

}

function buscarModulo(){

const texto =
document.getElementById('buscador')
.value
.toLowerCase();

document.querySelectorAll('.card')
.forEach(card=>{

if(card.innerText.toLowerCase().includes(texto)){
card.style.display='flex';
}else{
card.style.display='none';
}

});

}

window.onload=()=>{

actualizarFechaHora();

setInterval(actualizarFechaHora,1000);

}

</script>

</body>
</html>
