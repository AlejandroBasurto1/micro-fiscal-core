<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Fiscal Core</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07111f;
color:white;
padding:12px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.card{
background:#132238;
padding:10px;
border-radius:18px;
height:85px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
cursor:pointer;
opacity:.4;
filter:grayscale(100%);
transition:.2s;
}

.card.active{
opacity:1;
filter:grayscale(0%);
transform:scale(1.03);
box-shadow:0 0 18px rgba(16,185,129,.4);
}

.card span{
font-size:28px;
margin-bottom:5px;
}

.card h3{
font-size:12px;
}

.section{
background:#132238;
padding:15px;
border-radius:20px;
margin-bottom:15px;
min-height:240px;
}

input,
select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:10px;
background:#1b2f4a;
color:white;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#10b981;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.action{
padding:14px;
border-radius:16px;
text-align:center;
font-size:13px;
font-weight:bold;
}

.save{background:#10b981;}
.edit{background:#3b82f6;}
.delete{background:#ef4444;}
.export{background:#15803d;}

.results{
background:#132238;
padding:15px;
border-radius:20px;
}

.result-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.result-card{
background:#1b2f4a;
padding:14px;
border-radius:14px;
text-align:center;
}

.result-card h4{
font-size:12px;
margin-bottom:8px;
opacity:.8;
}

.result-card p{
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">🚀 Micro Fiscal Core</div>
</div>

<div class="grid">

<div class="card active" onclick="activar(this)">
<span>💰</span>
<h3>Ingresos</h3>
</div>

<div class="card" onclick="activar(this)">
<span>💸</span>
<h3>Gastos</h3>
</div>

<div class="card" onclick="activar(this)">
<span>👥</span>
<h3>Clientes</h3>
</div>

<div class="card" onclick="activar(this)">
<span>🛠️</span>
<h3>Mantenimiento</h3>
</div>

</div>

<div class="section" id="contenido"></div>

<div class="actions">

<div class="action save">
💾 Guardar
</div>

<div class="action edit">
✏️ Editar
</div>

<div class="action delete">
🗑️ Borrar
</div>

<div class="action export">
📤 Excel
</div>

</div>

<div class="results">

<h2>📊 Resultado Financiero</h2>

<div class="result-grid">

<div class="result-card">
<h4>Resultado</h4>
<p id="resultadoValor">$0</p>
</div>

<div class="result-card">
<h4>IVA</h4>
<p id="ivaValor">$0</p>
</div>

<div class="result-card">
<h4>ISR</h4>
<p id="isrValor">$0</p>
</div>

<div class="result-card">
<h4>Ganancia Real</h4>
<p id="gananciaRealValor">$0</p>
</div>

</div>

</div>

<script>

let regimenFiscal =
localStorage.getItem("regimenFiscal")
|| "Asalariado";

let ingresos =
JSON.parse(localStorage.getItem("ingresos"))
|| [];

let gastos =
JSON.parse(localStorage.getItem("gastos"))
|| [];

window.onload = ()=>{

activar(document.querySelector('.card.active'));
calcularResultados();

};

function activar(elemento){

document.querySelectorAll('.card')
.forEach(card=>{
card.classList.remove('active');
});

elemento.classList.add('active');

const titulo =
elemento.innerText.trim();

const contenido =
document.getElementById('contenido');



if(titulo.includes('Ingresos')){

contenido.innerHTML = `

<h2>💰 Ingresos</h2>

<input
id="conceptoIngreso"
type="text"
placeholder="Concepto ingreso">

<input
id="montoIngreso"
type="number"
placeholder="Monto">

<select id="regimenSelect">

<option value="Asalariado"
${regimenFiscal==="Asalariado" ? "selected" : ""}>
👨‍💼 Asalariado
</option>

<option value="Actividad Empresarial"
${regimenFiscal==="Actividad Empresarial" ? "selected" : ""}>
🏢 Actividad Empresarial
</option>

</select>

<button onclick="guardarRegimen()">
💾 Guardar Régimen
</button>

<button onclick="guardarIngreso()">
💰 Guardar Ingreso
</button>

`;

}



else if(titulo.includes('Gastos')){

if(regimenFiscal==="Asalariado"){

contenido.innerHTML = `

<h2>🚚 Viáticos</h2>

<input
id="montoGasto"
type="number"
placeholder="Monto">

<select id="tipoGasto">

<option>⛽ Gasolina</option>
<option>🏨 Hotel</option>
<option>🍽️ Alimentos</option>
<option>🚕 Transporte</option>
<option>🛣️ Casetas</option>

</select>

<button onclick="guardarGasto()">
💾 Guardar Viático
</button>

`;

}else{

contenido.innerHTML = `

<h2>💸 Gastos Operativos</h2>

<input
id="montoGasto"
type="number"
placeholder="Monto">

<select id="tipoGasto">

<option>⛽ Gasolina</option>
<option>📦 Insumos</option>
<option>🔧 Herramientas</option>
<option>🚚 Logística</option>
<option>🛠️ Mantenimiento</option>

</select>

<button onclick="guardarGasto()">
💾 Guardar Gasto
</button>

`;

}

}



else if(titulo.includes('Clientes')){

contenido.innerHTML = `

<h2>👥 Clientes</h2>

<input type="text"
placeholder="Nombre cliente">

<input type="text"
placeholder="Teléfono">

<button>
💾 Guardar Cliente
</button>

`;

}



else if(titulo.includes('Mantenimiento')){

contenido.innerHTML = `

<h2>🛠️ Mantenimiento</h2>

<input type="text"
placeholder="Concepto">

<input type="number"
placeholder="Kilometraje">

<input type="number"
placeholder="Costo">

<button>
💾 Guardar Mantenimiento
</button>

`;

}

}

function guardarRegimen(){

regimenFiscal =
document.getElementById('regimenSelect').value;

localStorage.setItem(
"regimenFiscal",
regimenFiscal
);

alert("Régimen guardado");

}

function guardarIngreso(){

const concepto =
document.getElementById(
'conceptoIngreso'
).value;

const monto =
parseFloat(
document.getElementById(
'montoIngreso'
).value
) || 0;

ingresos.push({
concepto,
monto
});

localStorage.setItem(
"ingresos",
JSON.stringify(ingresos)
);

calcularResultados();

alert("Ingreso guardado");

}

function guardarGasto(){

const concepto =
document.getElementById(
'tipoGasto'
).value;

const monto =
parseFloat(
document.getElementById(
'montoGasto'
).value
) || 0;

gastos.push({
concepto,
monto,
regimen:regimenFiscal
});

localStorage.setItem(
"gastos",
JSON.stringify(gastos)
);

calcularResultados();

alert("Gasto guardado");

}

function calcularResultados(){

let totalIngresos = 0;
let totalGastos = 0;

ingresos.forEach(item=>{
totalIngresos += item.monto;
});

gastos.forEach(item=>{
totalGastos += item.monto;
});

const resultado =
totalIngresos - totalGastos;

const iva =
resultado * 0.16;

const isr =
resultado * 0.10;

const gananciaReal =
resultado - iva - isr;

document.getElementById(
'resultadoValor'
).innerText =
'$' + resultado.toFixed(2);

document.getElementById(
'ivaValor'
).innerText =
'$' + iva.toFixed(2);

document.getElementById(
'isrValor'
).innerText =
'$' + isr.toFixed(2);

document.getElementById(
'gananciaRealValor'
).innerText =
'$' + gananciaReal.toFixed(2);

}

</script>

</body>
</html>
