<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Fiscal Core</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#07111f;
color:white;
padding:12px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.status-bar{
display:flex;
gap:8px;
align-items:center;
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
background:#4b5563;
}

.status-ok{
background:#10b981;
box-shadow:0 0 10px #10b981;
}

.status-alert{
background:#3b82f6;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:.2;}
100%{opacity:1;}
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.card{
background:#132238;
padding:10px;
border-radius:18px;
height:85px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:.2s;
cursor:pointer;
opacity:.35;
filter:grayscale(100%);
}

.card.active{
opacity:1;
filter:grayscale(0%);
transform:scale(1.03);
box-shadow:0 0 18px rgba(16,185,129,.4);
}

.card span{
font-size:28px;
margin-bottom:5px;
}

.card h3{
font-size:13px;
}

.tools{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.tool{
background:#132238;
padding:10px;
border-radius:18px;
height:75px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-size:12px;
opacity:.4;
filter:grayscale(100%);
transition:.2s;
cursor:pointer;
}

.tool.active{
opacity:1;
filter:grayscale(0%);
}

.tool span{
font-size:24px;
margin-bottom:5px;
}

.section{
background:#132238;
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

.section h2{
margin-bottom:15px;
font-size:20px;
}

input,
select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:10px;
background:#1b2f4a;
color:white;
font-size:14px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#10b981;
color:white;
font-size:15px;
font-weight:bold;
}

.actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.action{
padding:14px;
border-radius:16px;
text-align:center;
font-weight:bold;
font-size:14px;
opacity:.5;
filter:grayscale(100%);
}

.action.active{
opacity:1;
filter:grayscale(0%);
}

.save{background:#10b981;}
.edit{background:#3b82f6;}
.delete{background:#ef4444;}
.excel{background:#15803d;}

.results{
background:#132238;
padding:15px;
border-radius:20px;
}

.result-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.result-card{
background:#1b2f4a;
padding:14px;
border-radius:14px;
text-align:center;
}

.result-card h4{
font-size:12px;
margin-bottom:8px;
opacity:.7;
}

.result-card p{
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">🚀 Micro Fiscal Core</div>
<div class="status-bar">
<div class="status-dot status-ok"></div>
<div class="status-dot"></div>
<div class="status-dot status-alert"></div>
</div>
</div>

<div class="grid">

<div class="card active" onclick="activar(this)">
<span>💰</span>
<h3>Ingresos</h3>
</div>

<div class="card" onclick="activar(this)">
<span>🏦</span>
<h3>Bancos</h3>
</div>

<div class="card" onclick="activar(this)">
<span>💸</span>
<h3>Gastos</h3>
</div>

<div class="card" onclick="activar(this)">
<span>🚚</span>
<h3>Viáticos</h3>
</div>

</div>

<div class="grid">

<div class="card" onclick="activar(this)">
<span>📦</span>
<h3>Proveedores</h3>
</div>

<div class="card" onclick="activar(this)">
<span>👥</span>
<h3>Clientes</h3>
</div>

<div class="card" onclick="activar(this)">
<span>📍</span>
<h3>Ruta</h3>
</div>

<div class="card" onclick="activar(this)">
<span>🛠️</span>
<h3>Mantenimiento</h3>
</div>

</div>

<div class="tools">

<div class="tool active" onclick="activarTool(this)">
<span>📷</span>
OCR
</div>

<div class="tool" onclick="activarTool(this)">
<span>🔳</span>
QR
</div>

<div class="tool" onclick="activarTool(this)">
<span>📦</span>
Código
</div>

<div class="tool" onclick="activarTool(this)">
<span>📍</span>
GPS
</div>

</div>

<div class="section" id="contenido"></div>

<div class="actions">

<div class="action save active">
💾 Guardar
</div>

<div class="action edit">
✏️ Editar
</div>

<div class="action delete">
🗑️ Borrar
</div>

<div class="action excel">
📤 Excel
</div>

</div>

<div class="results">

<h2>📊 Resultado Financiero</h2>

<div class="result-grid">

<div class="result-card">
<h4>Resultado</h4>
<p id="resultadoValor">$0</p>
</div>

<div class="result-card">
<h4>IVA</h4>
<p id="ivaValor">$0</p>
</div>

<div class="result-card">
<h4>ISR</h4>
<p id="isrValor">$0</p>
</div>

<div class="result-card">
<h4>Ganancia Real</h4>
<p id="gananciaRealValor">$0</p>
</div>

</div>

</div>

<script>

let regimenFiscal =
localStorage.getItem("regimenFiscal")
|| "Asalariado";

let ingresos = JSON.parse(
localStorage.getItem("ingresos")
) || [];

let gastosGuardados = JSON.parse(
localStorage.getItem("gastosGuardados")
) || [];

window.addEventListener('load', ()=>{

activar(document.querySelector('.card.active'));
calcularResultados();

});

function activar(elemento){

regimenFiscal =
localStorage.getItem("regimenFiscal")
|| "Asalariado";

const cards =
document.querySelectorAll('.card');

cards.forEach(card=>{
card.classList.remove('active');
});

elemento.classList.add('active');

const titulo =
elemento.innerText.trim();

const contenido =
document.getElementById('contenido');

if(titulo.includes('Ingresos')){

contenido.innerHTML = `

<h2>💰 Ingresos</h2>

<input type="text"
id="conceptoIngreso"
placeholder="Concepto ingreso">

<input type="number"
id="montoIngreso"
placeholder="Monto">

<select id="regimenSelect">

<option value="Actividad Empresarial"
${regimenFiscal === "Actividad Empresarial"
? "selected" : ""}>

🏢 Actividad Empresarial

</option>

<option value="Asalariado"
${regimenFiscal === "Asalariado"
? "selected" : ""}>

👨‍💼 Asalariado

</option>

</select>

<button onclick="guardarRegimen()">
💾 Guardar Régimen
</button>

<button onclick="guardarIngreso()">
💰 Guardar Ingreso
</button>

`;

}

else if(titulo.includes('Gastos')){

if(regimenFiscal === "Asalariado"){

contenido.innerHTML = `

<h2>🚚 Viáticos Asalariado</h2>

<input type="number"
id="montoViatico"
placeholder="Monto">

<select id="tipoViatico">

<option value="Gasolina">⛽ Gasolina</option>
<option value="Hotel">🏨 Hotel</option>
<option value="Alimentos">🍽️ Alimentos</option>
<option value="Lavanderia">🧺 Lavandería</option>
<option value="Transporte">🚕 Transporte</option>
<option value="Casetas">🛣️ Casetas</option>
<option value="Propinas">💵 Propinas</option>

</select>

<button onclick="guardarGasto()">
💾 Guardar Viático
</button>

`;

}else{

contenido.innerHTML = `

<h2>💸 Gastos Operativos</h2>

<input type="number"
id="montoGasto"
placeholder="Monto">

<select id="tipoGasto">

<option value="Gasolina">⛽ Gasolina</option>
<option value="Insumos">📦 Insumos</option>
<option value="Herramientas">🔧 Herramientas</option>
<option value="Logistica">🚚 Logística</option>
<option value="Mantenimiento">🛠️ Mantenimiento</option>

</select>

<button onclick="guardarGasto()">
💾 Guardar Gasto
</button>

`;

}

}

}

function guardarRegimen(){

const select =
document.getElementById('regimenSelect');

regimenFiscal =
select.value;

localStorage.setItem(
"regimenFiscal",
regimenFiscal
);

alert(
"Régimen guardado: "
+ regimenFiscal
);

}

function guardarIngreso(){

const concepto =
document.getElementById(
"conceptoIngreso"
).value;

const monto =
parseFloat(
document.getElementById(
"montoIngreso"
).value
) || 0;

const nuevoIngreso = {
concepto,
monto
};

ingresos.push(nuevoIngreso);

localStorage.setItem(
"ingresos",
JSON.stringify(ingresos)
);

calcularResultados();

alert("Ingreso guardado");

}

function guardarGasto(){

let concepto = "";
let monto = 0;

if(regimenFiscal === "Asalariado"){

concepto =
document.getElementById(
"tipoViatico"
).value;

monto =
parseFloat(
document.getElementById(
"montoViatico"
).value
) || 0;

}else{

concepto =
document.getElementById(
"tipoGasto"
).value;

monto =
parseFloat(
document.getElementById(
"montoGasto"
).value
) || 0;

}

const nuevoGasto = {
concepto,
monto,
regimen: regimenFiscal
};

gastosGuardados.push(nuevoGasto);

localStorage.setItem(
"gastosGuardados",
JSON.stringify(gastosGuardados)
);

calcularResultados();

alert("Gasto guardado");

}

function calcularResultados(){

let totalIngresos = 0;
let totalGastos = 0;

ingresos.forEach(item=>{
totalIngresos += item.monto;
});

gastosGuardados.forEach(item=>{
totalGastos += item.monto;
});

const resultado =
totalIngresos - totalGastos;

const iva =
resultado * 0.16;

const isr =
resultado * 0.10;

const gananciaReal =
resultado - iva - isr;

document.getElementById(
"resultadoValor"
).innerText =
"$" + resultado.toFixed(2);

document.getElementById(
"ivaValor"
).innerText =
"$" + iva.toFixed(2);

document.getElementById(
"isrValor"
).innerText =
"$" + isr.toFixed(2);

document.getElementById(
"gananciaRealValor"
).innerText =
"$" + gananciaReal.toFixed(2);

}

function activarTool(elemento){

const tools =
document.querySelectorAll('.tool');

tools.forEach(tool=>{
tool.classList.remove('active');
});

elemento.classList.add('active');

}

</script>

</body>
</html>
