<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>MRFC CORE</title>

<style>

:root{

--bg:#07111f;
--panel:#132238;
--panel2:#1a2d46;
--text:#ffffff;
--green:#10b981;
--blue:#38bdf8;
--yellow:#facc15;
--red:#ef4444;

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:var(--bg);
color:var(--text);
font-family:Arial,sans-serif;
padding:16px;
min-height:100vh;

}

/* TOPBAR */

.topbar{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;

}

.logo-box{

display:flex;
align-items:center;
gap:10px;

padding:14px;
border-radius:18px;

background:var(--panel);

}

.logo-icon{

width:50px;
height:50px;

border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
135deg,
#10b981,
#3b82f6
);

font-weight:bold;
font-size:22px;

}

.logo-text h1{

font-size:22px;

}

.logo-text p{

font-size:11px;
opacity:.7;

}

.actions-top{

display:flex;
gap:8px;

}

.icon-btn{

width:40px;
height:40px;

border-radius:12px;

display:flex;
align-items:center;
justify-content:center;

background:var(--panel);

cursor:pointer;

}

/* PANEL */

.panel{

background:var(--panel);

padding:20px;

border-radius:22px;

margin-bottom:16px;

}

.panel h2{

margin-bottom:16px;

}

/* FORM */

.form-grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;

}

input,
select,
button{

width:100%;

padding:12px;

border:none;
outline:none;

border-radius:14px;

font-size:14px;

}

input,
select{

background:var(--panel2);

color:white;

}

button{

cursor:pointer;
font-weight:bold;

}

.primary-btn{

background:
linear-gradient(
135deg,
#10b981,
#059669
);

color:white;

}

/* RESULTS */

.results{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;

margin-top:20px;

}

.card{

background:var(--panel2);

padding:16px;

border-radius:18px;

text-align:center;

}

.card h4{

font-size:11px;
opacity:.7;
margin-bottom:8px;

}

.card span{

font-size:18px;
font-weight:bold;

}

/* HISTORIAL */

.historial-item{

background:var(--panel2);

padding:16px;

border-radius:16px;

margin-top:10px;

line-height:1.7;

}

/* TOAST */

#toastContainer{

position:fixed;

top:20px;
right:20px;

display:flex;
flex-direction:column;
gap:10px;

z-index:99999;

}

.toast{

background:var(--panel);

padding:12px 16px;

border-radius:12px;

}

/* MOBILE */

@media(max-width:800px){

.form-grid{

grid-template-columns:1fr;

}

.results{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div id="toastContainer"></div>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo-box">

<div class="logo-icon">
MR
</div>

<div class="logo-text">

<h1>MRFC</h1>

<p>
MICRO REAL FISCAL CORE
</p>

</div>

</div>

<div class="actions-top">

<div class="icon-btn">
🏠
</div>

<div class="icon-btn">
📊
</div>

<div class="icon-btn">
🧮
</div>

<div class="icon-btn">
⚙️
</div>

</div>

</div>

<!-- PANEL PRINCIPAL -->

<div class="panel">

<h2>
⚙️ Operación Fiscal
</h2>

<div class="form-grid">

<select id="regimen">

<option selected disabled>
Selecciona régimen
</option>

<option>
GENERAL
</option>

<option>
RESICO
</option>

<option>
RIF
</option>

</select>

<select id="operacion">

<option selected disabled>
Tipo operación
</option>

<option>
Venta
</option>

<option>
Servicio
</option>

<option>
Factura
</option>

</select>

<input
type="text"
id="cliente"
placeholder="👤 Cliente"
>

<input
type="number"
id="monto"
placeholder="💰 Monto"
>

<input
type="number"
id="distancia"
placeholder="🚚 Distancia KM"
>

<select id="metodoPago">

<option selected disabled>
💳 Método pago
</option>

<option>
Efectivo
</option>

<option>
Transferencia
</option>

<option>
Tarjeta
</option>

</select>

</div>

<br>

<button
class="primary-btn"
id="calcularBtn"
>

💾 Guardar Operación

</button>

<div class="results">

<div class="card">

<h4>
IVA
</h4>

<span id="ivaResultado">
$0.00
</span>

</div>

<div class="card">

<h4>
ISR
</h4>

<span id="isrResultado">
$0.00
</span>

</div>

<div class="card">

<h4>
NETO
</h4>

<span id="netoResultado">
$0.00
</span>

</div>

<div class="card">

<h4>
RENTABILIDAD
</h4>

<span id="rentabilidadResultado">
-
</span>

</div>

</div>

</div>

<!-- HISTORIAL -->

<div class="panel">

<h2>
📊 Historial
</h2>

<div id="historial">

<p style="opacity:.7;">
No existen registros.
</p>

</div>

</div>

<script>

/* TOAST */

function showToast(message){

const container =
document.getElementById(
'toastContainer'
);

const toast =
document.createElement('div');

toast.className='toast';

toast.innerText=message;

container.appendChild(toast);

setTimeout(()=>{

toast.remove();

},3000);

}

/* SAT */

const SAT_RULES = {

GENERAL:{
iva:.16,
isr:.30
},

RESICO:{
iva:.16,
isr:.025
},

RIF:{
iva:.16,
isr:.02
}

};

/* RENTABILIDAD */

function analizarRuta(
distancia,
monto
){

if(
distancia <= 2 &&
monto >= 200
){

return '🟢 Alta';

}

if(
distancia <= 5 &&
monto >= 150
){

return '🟡 Media';

}

return '🔴 Riesgo';

}

/* STORAGE */

function guardarRegistro(data){

const registros =
JSON.parse(
localStorage.getItem(
'mrfc-registros'
)
) || [];

registros.push(data);

localStorage.setItem(
'mrfc-registros',
JSON.stringify(registros)
);

}

/* HISTORIAL */

function renderHistorial(){

const historial =
document.getElementById(
'historial'
);

const registros =
JSON.parse(
localStorage.getItem(
'mrfc-registros'
)
) || [];

if(registros.length===0){

historial.innerHTML=
`
<p style="opacity:.7;">
No existen registros.
</p>
`;

return;

}

historial.innerHTML='';

registros.reverse().forEach(reg=>{

const div =
document.createElement('div');

div.className=
'historial-item';

div.innerHTML = `

<b>${reg.cliente}</b><br>

💰 ${reg.monto}<br>

🚚 ${reg.distancia} KM<br>

📊 ${reg.regimen}<br>

💳 ${reg.metodoPago}<br>

📈 ${reg.rentabilidad}<br>

📅 ${reg.fecha}

`;

historial.appendChild(div);

});

}

/* CALCULAR */

document
.getElementById(
'calcularBtn'
)
.addEventListener(
'click',
()=>{

const regimen =
document
.getElementById(
'regimen'
).value;

const cliente =
document
.getElementById(
'cliente'
).value;

const monto =
parseFloat(

document
.getElementById(
'monto'
).value || 0

);

const distancia =
parseFloat(

document
.getElementById(
'distancia'
).value || 0

);

const metodoPago =
document
.getElementById(
'metodoPago'
).value;

if(
!regimen ||
!monto
){

showToast(
'Completa los campos'
);

return;

}

const reglas =
SAT_RULES[regimen];

const iva =
monto * reglas.iva;

const isr =
monto * reglas.isr;

const neto =
monto - isr;

const rentabilidad =
analizarRuta(
distancia,
monto
);

document
.getElementById(
'ivaResultado'
)
.innerText =
'$' + iva.toFixed(2);

document
.getElementById(
'isrResultado'
)
.innerText =
'$' + isr.toFixed(2);

document
.getElementById(
'netoResultado'
)
.innerText =
'$' + neto.toFixed(2);

document
.getElementById(
'rentabilidadResultado'
)
.innerText =
rentabilidad;

const registro = {

cliente,
monto,
distancia,
regimen,
metodoPago,
rentabilidad,

fecha:
new Date()
.toLocaleString(
'es-MX'
)

};

guardarRegistro(
registro
);

renderHistorial();

showToast(
'Operación guardada'
);

}
);

/* INIT */

renderHistorial();

</script>

</body>
</html>
