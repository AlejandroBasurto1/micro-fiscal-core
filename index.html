<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Fiscal Core</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#07111f;
color:white;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-size:32px;
font-weight:bold;
}

.mode{
background:#132238;
padding:10px 15px;
border-radius:15px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-bottom:25px;
}

.card{
background:#132238;
padding:20px;
border-radius:22px;
min-height:120px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.2);
transition:.2s;
}

.card:hover{
transform:scale(1.03);
}

.card span{
font-size:40px;
margin-bottom:10px;
}

.card h3{
font-size:18px;
}

.section{
background:#132238;
padding:20px;
border-radius:22px;
margin-bottom:25px;
}

.section h2{
margin-bottom:20px;
}

input,select{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-bottom:15px;
background:#1b2f4a;
color:white;
font-size:16px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#10b981;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.tools{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.tool{
background:#132238;
padding:20px;
border-radius:20px;
text-align:center;
}

.tool span{
font-size:45px;
display:block;
margin-bottom:10px;
}

.actions{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.action{
padding:20px;
border-radius:20px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.save{background:#10b981;}
.edit{background:#3b82f6;}
.delete{background:#ef4444;}
.excel{background:#15803d;}

@media(min-width:768px){
.grid{
grid-template-columns:repeat(4,1fr);
}

.tools{
grid-template-columns:repeat(3,1fr);
}

.actions{
grid-template-columns:repeat(4,1fr);
}
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🚀 Micro Fiscal Core</div>
<div class="mode">Modo Repartidor</div>
</div>

<div class="grid">

<div class="card">
<span>💰</span>
<h3>Ingresos</h3>
</div>

<div class="card">
<span>💸</span>
<h3>Gastos</h3>
</div>

<div class="card">
<span>📊</span>
<h3>Estimado</h3>
</div>

<div class="card">
<span>🧾</span>
<h3>IVA</h3>
</div>

<div class="card">
<span>📝</span>
<h3>Registro</h3>
</div>

<div class="card">
<span>🚚</span>
<h3>Viáticos</h3>
</div>

<div class="card">
<span>👥</span>
<h3>Clientes</h3>
</div>

<div class="card">
<span>🗺️</span>
<h3>Rutas</h3>
</div>

</div>

<div class="section">

<h2>⛽ Nuevo Movimiento</h2>

<input type="text" placeholder="Concepto">

<input type="number" placeholder="Monto">

<input type="number" placeholder="Litros gasolina">

<input type="number" placeholder="Odómetro">

<select>
<option>Ingreso</option>
<option>Gasto</option>
</select>

<button>➕ Guardar Movimiento</button>

</div>

<div class="tools">

<div class="tool">
<span>📷</span>
OCR
</div>

<div class="tool">
<span>🔳</span>
QR
</div>

<div class="tool">
<span>📦</span>
Código
</div>

</div>

<div class="actions">

<div class="action save">
💾 Guardar
</div>

<div class="action edit">
✏️ Editar
</div>

<div class="action delete">
🗑️ Borrar
</div>

<div class="action excel">
📤 Excel
</div>

</div>

</body>
</html>
