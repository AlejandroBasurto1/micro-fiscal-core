<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRFC - Micro Real Fiscal Core</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#081120;
color:white;
padding:18px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
margin-bottom:18px;
flex-wrap:wrap;
}

.logo-box{
display:flex;
align-items:center;
gap:12px;
}

.logo-icon{
width:55px;
height:55px;
border-radius:14px;
background:#132238;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
border:1px solid #28415f;
}

.logo-text h1{
font-size:26px;
}

.logo-text p{
font-size:12px;
opacity:.7;
letter-spacing:2px;
}

.top-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.mini-btn{
width:42px;
height:42px;
border-radius:12px;
background:#132238;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.25s;
border:1px solid #28415f;
font-size:18px;
}

.mini-btn:hover{
transform:scale(1.08);
background:#1b2f4a;
}

/* BUSCADOR */

.search-row{
display:flex;
gap:15px;
margin-bottom:18px;
align-items:center;
flex-wrap:wrap;
}

.search-box{
flex:1;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#132238;
color:white;
font-size:15px;
}

/* SEMAFORO */

.semaforo{
display:flex;
gap:8px;
align-items:center;
}

.luz{
width:18px;
height:18px;
border-radius:50%;
opacity:.3;
}

.rojo{background:#ef4444;}
.amarillo{background:#facc15;}
.verde{background:#10b981;}

.luz.active{
opacity:1;
box-shadow:0 0 12px currentColor;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:14px;
margin-bottom:18px;
}

.card{
background:#132238;
padding:22px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:.25s;
border:1px solid #28415f;
}

.card:hover{
transform:translateY(-3px);
}

.card span{
font-size:28px;
display:block;
margin-bottom:10px;
}

.card h3{
font-size:16px;
}

/* ALERTA */

.alert{
margin-bottom:18px;
font-size:14px;
color:#93c5fd;
}

/* SECCION */

.section{
background:#132238;
padding:20px;
border-radius:18px;
margin-bottom:18px;
border:1px solid #28415f;
}

.section h2{
margin-bottom:18px;
font-size:28px;
}

select{
width:100%;
padding:14px;
margin-bottom:14px;
border:none;
border-radius:14px;
background:#1b3150;
color:white;
font-size:15px;
}

#modoActual,
#modulosActivos{
margin-top:12px;
}

/* BOTONES */

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
}

.action{
padding:16px;
text-align:center;
border-radius:16px;
font-weight:bold;
cursor:pointer;
transition:.25s;
}

.action:hover{
transform:scale(1.02);
}

.save{
background:#10b981;
}

.edit{
background:#facc15;
color:black;
}

.clear{
background:#ef4444;
}

.excel{
background:#2563eb;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo-box">

<div class="logo-icon">
MR
</div>

<div class="logo-text">
<h1>MRFC</h1>
<p>MICRO REAL FISCAL CORE</p>
</div>

</div>

<div class="top-actions">

<div class="mini-btn" onclick="location.reload()">
🏠
</div>

<div class="mini-btn">
⬅️
</div>

<div class="mini-btn">
➡️
</div>

<div class="mini-btn">
📸
</div>

</div>

</div>

<!-- BUSCADOR -->

<div class="search-row">

<div class="search-box">
<input type="text" id="buscador" placeholder="🔍 Buscar módulo...">
</div>

<div class="semaforo">
<div class="luz rojo active"></div>
<div class="luz amarillo"></div>
<div class="luz verde"></div>
</div>

</div>

<!-- LINEA 1 -->

<div class="grid">

<div class="card">
<span>💼</span>
<h3>Actividad</h3>
</div>

<div class="card">
<span>🏦</span>
<h3>Bancos</h3>
</div>

<div class="card">
<span>💸</span>
<h3>Gastos</h3>
</div>

<div class="card">
<span>🚚</span>
<h3>Viáticos</h3>
</div>

</div>

<!-- LINEA 2 -->

<div class="grid">

<div class="card">
<span>👥</span>
<h3>Cliente</h3>
</div>

<div class="card">
<span>🛠️</span>
<h3>Mantenimiento</h3>
</div>

<div class="card">
<span>📦</span>
<h3>Proveedor</h3>
</div>

<div class="card">
<span>📍</span>
<h3>Rutas</h3>
</div>

</div>

<!-- LINEA 3 -->

<div class="grid">

<div class="card">
<span>📦</span>
<h3>Código</h3>
</div>

<div class="card">
<span>📍</span>
<h3>GPS</h3>
</div>

<div class="card">
<span>📷</span>
<h3>OCR</h3>
</div>

<div class="card">
<span>🔳</span>
<h3>QR</h3>
</div>

</div>

<div class="alert" id="alerta"></div>

<!-- OPERACION -->

<div class="section">

<h2>⚙️ Operación del Día</h2>

<select>
<option>Selecciona contexto fiscal</option>
<option>GENERAL</option>
<option>PFAE</option>
<option>PLADIG</option>
<option>RESICO</option>
<option>RIF</option>
<option>SUSA</option>
</select>

<select>
<option>Selecciona operación</option>
<option>Distribución</option>
<option>General</option>
<option>Instalación</option>
<option>Personal</option>
<option>Servicio</option>
<option>Venta</option>
</select>

<div id="modoActual"></div>
<div id="modulosActivos"></div>

</div>

<!-- BOTONES -->

<div class="actions">

<div class="action save">
💾 Guardar
</div>

<div class="action edit">
✏️ Editar
</div>

<div class="action clear">
🗑️ Limpiar
</div>

<div class="action excel">
📤 Excel
</div>

</div>

</body>
</html>
```
