<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>MRFC HUD CORE</title>

<style>

:root{

--bg:#07111f;
--panel:#132238;
--panel2:#1a2d46;
--border:#28415f;

--text:#ffffff;
--soft:#9fb3c8;

--green:#10b981;
--blue:#38bdf8;
--yellow:#facc15;
--red:#ef4444;

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:var(--bg);

color:var(--text);

font-family:Arial,sans-serif;

padding:14px;

min-height:100vh;

overflow-x:hidden;

}

/* TOPBAR */

.topbar{

display:flex;
justify-content:space-between;
align-items:center;

gap:10px;

margin-bottom:14px;

flex-wrap:wrap;

}

.logo-box{

display:flex;
align-items:center;
gap:10px;

padding:12px;

border-radius:18px;

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.98)
);

border:1px solid rgba(56,189,248,.12);

}

.logo-icon{

width:54px;
height:54px;

border-radius:16px;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
font-weight:bold;

background:
linear-gradient(
135deg,
#10b981,
#3b82f6
);

}

.logo-text h1{

font-size:22px;

}

.logo-text p{

font-size:10px;
opacity:.7;

}

.top-actions{

display:flex;
gap:8px;

}

.mini-btn{

width:38px;
height:38px;

border-radius:12px;

display:flex;
align-items:center;
justify-content:center;

background:var(--panel);

border:1px solid rgba(56,189,248,.12);

cursor:pointer;

}

/* SEARCH */

.search-row{

display:flex;
gap:8px;

margin-bottom:10px;

}

.search-box{

flex:1;

}

.search-box input{

width:100%;

padding:12px;

border:none;
outline:none;

border-radius:12px;

background:var(--panel);

color:white;

}

.semaforo{

display:flex;
gap:6px;

padding:10px;

border-radius:12px;

background:var(--panel);

}

.luz{

width:14px;
height:14px;

border-radius:50%;

opacity:.3;

}

.active{

opacity:1;

}

.rojo{
background:#ef4444;
}

.amarillo{
background:#facc15;
}

.verde{
background:#22c55e;
}

/* CARDS */

.grid{

display:flex;
gap:10px;

margin-bottom:12px;

}

.card{

flex:1;

height:70px;

border-radius:18px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.98)
);

border:1px solid rgba(56,189,248,.12);

cursor:pointer;

transition:.2s;

}

.card:hover{

transform:translateY(-2px);

}

.card span{

font-size:22px;

}

.card h3{

font-size:11px;
margin-top:6px;

font-weight:normal;

}

.card.active{

border-color:#10b981;

box-shadow:
0 0 10px rgba(16,185,129,.15);

}

/* PANEL */

.section{

padding:18px;

border-radius:22px;

background:
linear-gradient(
180deg,
rgba(20,35,55,.96),
rgba(10,18,30,.98)
);

border:1px solid rgba(56,189,248,.12);

margin-bottom:14px;

}

.section h2{

margin-bottom:16px;

}

/* FORM */

.form-grid{

display:grid;
grid-template-columns:repeat(2,1fr);

gap:10px;

}

input,
select,
button{

width:100%;

padding:12px;

border:none;
outline:none;

border-radius:14px;

font-size:14px;

}

input,
select{

background:rgba(255,255,255,.05);

color:white;

}

button{

cursor:pointer;

font-weight:bold;

}

.primary-btn{

background:
linear-gradient(
135deg,
#10b981,
#059669
);

color:white;

}

/* RESULTS */

.results{

display:grid;
grid-template-columns:repeat(4,1fr);

gap:10px;

margin-top:18px;

}

.result-card{

padding:14px;

border-radius:18px;

text-align:center;

background:rgba(255,255,255,.04);

}

.result-card h4{

font-size:11px;

opacity:.7;

margin-bottom:6px;

}

.result-card span{

font-size:18px;
font-weight:bold;

color:#22c55e;

}

</style>
</head>

<body>

<div class="topbar">

<div class="logo-box">

<div class="logo-icon">
MR
</div>

<div class="logo-text">

<h1>MRFC</h1>

<p>
MICRO REAL FISCAL CORE
</p>

</div>

</div>

<div class="top-actions">

<div class="mini-btn">
🏠
</div>

<div class="mini-btn">
📊
</div>

<div class="mini-btn">
🧮
</div>

<div class="mini-btn">
⚙️
</div>

</div>

</div>

<div class="search-row">

<div class="search-box">

<input
type="text"
placeholder="🔍 Buscar módulo..."
>

</div>

<div class="semaforo">

<div class="luz rojo active"></div>

<div class="luz amarillo"></div>

<div class="luz verde"></div>

</div>

</div>

<div class="grid">

<div class="card active">

<span>
💼
</span>

<h3>
Actividad
</h3>

</div>

<div class="card">

<span>
🏦
</span>

<h3>
Bancos
</h3>

</div>

<div class="card">

<span>
💸
</span>

<h3>
Gastos
</h3>

</div>

<div class="card">

<span>
🚚
</span>

<h3>
Viáticos
</h3>

</div>

</div>

<div class="section">

<h2>
⚙️ Operación Fiscal
</h2>

<div class="form-grid">

<select>

<option>
GENERAL
</option>

<option>
RESICO
</option>

<option>
RIF
</option>

</select>

<select>

<option>
Venta
</option>

<option>
Servicio
</option>

<option>
Factura
</option>

</select>

<input
type="text"
placeholder="👤 Cliente"
>

<input
type="number"
placeholder="💰 Monto"
>

<input
type="number"
placeholder="🚚 Distancia KM"
>

<select>

<option>
Efectivo
</option>

<option>
Transferencia
</option>

<option>
Tarjeta
</option>

</select>

</div>

<br>

<button class="primary-btn">

💾 Guardar Operación

</button>

<div class="results">

<div class="result-card">

<h4>
IVA
</h4>

<span>
$0.00
</span>

</div>

<div class="result-card">

<h4>
ISR
</h4>

<span>
$0.00
</span>

</div>

<div class="result-card">

<h4>
NETO
</h4>

<span>
$0.00
</span>

</div>

<div class="result-card">

<h4>
UTILIDAD
</h4>

<span>
-
</span>

</div>

</div>

</div>

</body>
</html>
