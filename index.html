<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Fiscal Core</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#07111f;
color:white;
padding:12px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.status-bar{
display:flex;
gap:8px;
align-items:center;
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
background:#4b5563;
}

.status-ok{
background:#10b981;
box-shadow:0 0 10px #10b981;
}

.status-alert{
background:#3b82f6;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:.2;}
100%{opacity:1;}
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.card{
background:#132238;
padding:10px;
border-radius:18px;
height:85px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:.2s;
cursor:pointer;
opacity:.35;
filter:grayscale(100%);
}

.card.active{
opacity:1;
filter:grayscale(0%);
transform:scale(1.03);
box-shadow:0 0 18px rgba(16,185,129,.4);
}

.card span{
font-size:28px;
margin-bottom:5px;
}

.card h3{
font-size:13px;
}

.tools{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.tool{
background:#132238;
padding:10px;
border-radius:18px;
height:75px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-size:12px;
opacity:.4;
filter:grayscale(100%);
transition:.2s;
cursor:pointer;
}

.tool.active{
opacity:1;
filter:grayscale(0%);
}

.tool span{
font-size:24px;
margin-bottom:5px;
}

.section{
background:#132238;
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

.section h2{
margin-bottom:15px;
font-size:20px;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:10px;
background:#1b2f4a;
color:white;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#374151;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button.ready{
background:#10b981;
box-shadow:0 0 15px rgba(16,185,129,.5);
}

.actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.action{
padding:14px;
border-radius:16px;
text-align:center;
font-weight:bold;
font-size:14px;
opacity:.5;
filter:grayscale(100%);
transition:.2s;
}

.action.active{
opacity:1;
filter:grayscale(0%);
}

.save{
background:#10b981;
}

.edit{
background:#3b82f6;
}

.delete{
background:#ef4444;
}

.excel{
background:#15803d;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
🚀 Micro Fiscal Core
</div>

<div class="status-bar">
<div class="status-dot status-ok"></div>
<div class="status-dot"></div>
<div class="status-dot status-alert"></div>
</div>

</div>

<div class="grid">

<div class="card active" onclick="activar(this)">
<span>💰</span>
<h3>Ingresos</h3>
</div>

<div class="card" onclick="activar(this)">
<span>💸</span>
<h3>Gastos</h3>
</div>

<div class="card" onclick="activar(this)">
<span>📊</span>
<h3>Estimado</h3>
</div>

<div class="card" onclick="activar(this)">
<span>🧾</span>
<h3>IVA</h3>
</div>

<div class="card" onclick="activar(this)">
<span>📝</span>
<h3>Registro</h3>
</div>

<div class="card" onclick="activar(this)">
<span>👥</span>
<h3>Clientes</h3>
</div>

<div class="card" onclick="activar(this)">
<span>🚚</span>
<h3>Viáticos</h3>
</div>

<div class="card" onclick="activar(this)">
<span>🗺️</span>
<h3>Rutas</h3>
</div>

</div>

<div class="tools">

<div class="tool active" onclick="activarTool(this)">
<span>📷</span>
OCR
</div>

<div class="tool" onclick="activarTool(this)">
<span>🔳</span>
QR
</div>

<div class="tool" onclick="activarTool(this)">
<span>📦</span>
Código
</div>

<div class="tool" onclick="activarTool(this)">
<span>📍</span>
GPS
</div>

</div>

<div class="section" id="contenido">

<h2>💰 Ingresos</h2>

<input type="text" placeholder="Concepto ingreso">

<input type="number" placeholder="Monto">

<select>
<option>Actividad Empresarial</option>
<option>Asalariado</option>
</select>

<button class="ready">
💾 Guardar Ingreso
</button>

</div>

<div class="actions">

<div class="action save active">
💾 Guardar
</div>

<div class="action edit">
✏️ Editar
</div>

<div class="action delete">
🗑️ Borrar
</div>

<div class="action excel">
📤 Excel
</div>

</div>

<script>

function activar(elemento){

const cards = document.querySelectorAll('.card');

cards.forEach(card=>{
card.classList.remove('active');
});

elemento.classList.add('active');

const titulo = elemento.innerText.trim();

const contenido = document.getElementById('contenido');

if(titulo.includes('Ingresos')){

contenido.innerHTML = `
<h2>💰 Ingresos</h2>

<input type="text" placeholder="Concepto ingreso">

<input type="number" placeholder="Monto">

<select>
<option>Actividad Empresarial</option>
<option>Asalariado</option>
</select>

<button class="ready">
💾 Guardar Ingreso
</button>
`;

}

else if(titulo.includes('Gastos')){

contenido.innerHTML = `
<h2>💸 Gastos</h2>

<input type="text" placeholder="Concepto gasto">

<input type="number" placeholder="Monto">

<select size="1">
<select>
<option>Gasolina Magna</option>
<option>Gasolina Premium</option>
<option>Diesel</option>
<option>Casetas</option>
<option>Hotel</option>
<option>Comida</option>
<option>Otros</option>
</select>

<input type="number" placeholder="Costo gasolina">

<input type="number" placeholder="Precio por litro">

<input type="number" placeholder="Odómetro actual">

<button class="ready">
💾 Guardar Movimiento
</button>
`;

}

else if(titulo.includes('Clientes')){

contenido.innerHTML = `
<h2>👥 Clientes</h2>

<input type="text" placeholder="Nombre cliente">

<input type="number" placeholder="Teléfono principal">

<input type="number" placeholder="Teléfono secundario">

<input type="text" placeholder="Referencia">

<button class="ready">
💾 Guardar Cliente
</button>
`;

}

else if(titulo.includes('Registro')){

contenido.innerHTML = `
<h2>📝 Proveedores</h2>

<input type="text" placeholder="Razón social">

<input type="text" placeholder="RFC">

<input type="text" placeholder="Correo">

<input type="number" placeholder="WhatsApp">

<button class="ready">
💾 Guardar Proveedor
</button>
`;

}

else if(titulo.includes('Viáticos')){

contenido.innerHTML = `
<h2>🚚 Viáticos</h2>

<input type="text" placeholder="Concepto">

<input type="number" placeholder="Monto">

<input type="number" placeholder="Litros gasolina">

<input type="number" placeholder="Odómetro">

<select size="1">
<option>Gasolina Magna</option>
<option>Gasolina Premium</option>
<option>Diesel</option>
<option>Casetas</option>
<option>Hotel</option>
<option>Comida</option>
<option>Taxi / Transporte</option>
<option>Otros</option>
</select>
<input type="number" placeholder="Costo gasolina">

<input type="number" placeholder="Precio por litro">

<input type="number" placeholder="Odómetro actual">

<button class="ready">
💾 Guardar Movimiento
</button>
`;

}

else if(titulo.includes('Rutas')){

contenido.innerHTML = `
<h2>🗺️ Rutas</h2>

<input type="text" placeholder="Origen">

<input type="text" placeholder="Cliente 1">

<input type="text" placeholder="Cliente 2">

<input type="text" placeholder="Cliente 3">

<button class="ready">
🚀 Calcular Ruta
</button>
`;

}

}

function activarTool(elemento){

const tools = document.querySelectorAll('.tool');

tools.forEach(tool=>{
tool.classList.remove('active');
});

elemento.classList.add('active');

}

</script>

</body>
</html>
