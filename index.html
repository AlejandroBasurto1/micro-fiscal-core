<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Fiscal Core</title>

<style>

body{
background:#07111f;
color:white;
font-family:Arial;
padding:12px;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.card{
background:#132238;
border-radius:18px;
padding:10px;
height:85px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:.45;
filter:grayscale(100%);
transition:.2s;
}

.card.active{
opacity:1;
filter:grayscale(0%);
box-shadow:0 0 18px rgba(16,185,129,.35);
}

.card span{
font-size:28px;
margin-bottom:5px;
}

.section{
background:#132238;
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

.section h2{
margin-bottom:15px;
}

input,
select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:10px;
background:#1b2f4a;
color:white;
font-size:14px;
}

.actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.action{
padding:14px;
border-radius:16px;
text-align:center;
font-weight:bold;
}

.save{background:#10b981;}
.edit{background:#3b82f6;}
.clear{background:#ef4444;}
.excel{background:#15803d;}

.tag{
display:inline-block;
padding:8px 12px;
border-radius:12px;
background:#1b2f4a;
margin:5px;
}

.alert{
background:#0f766e;
padding:12px;
border-radius:12px;
margin-bottom:15px;
display:none;
}

</style>
</head>

<body>

<div class="logo">
🚀 Micro Fiscal Core
</div>

<!-- LINEA 1 -->

<div class="grid">

<div class="card active">
<span>💼</span>
<h3>Actividad</h3>
</div>

<div class="card">
<span>🏦</span>
<h3>Bancos</h3>
</div>

<div class="card">
<span>💸</span>
<h3>Gastos</h3>
</div>

<div class="card">
<span>🚚</span>
<h3>Viáticos</h3>
</div>

</div>

<!-- LINEA 2 -->

<div class="grid">

<div class="card">
<span>📦</span>
<h3>Proveedor</h3>
</div>

<div class="card">
<span>👥</span>
<h3>Cliente</h3>
</div>

<div class="card">
<span>📍</span>
<h3>Rutas</h3>
</div>

<div class="card">
<span>🛠️</span>
<h3>Mantenimiento</h3>
</div>

</div>

<!-- LINEA 3 -->

<div class="grid">

<div class="card">
<span>📷</span>
<h3>OCR</h3>
</div>

<div class="card">
<span>🔳</span>
<h3>QR</h3>
</div>

<div class="card">
<span>📦</span>
<h3>Código</h3>
</div>

<div class="card">
<span>📍</span>
<h3>GPS</h3>
</div>

</div>

<div class="alert" id="alerta"></div>

<!-- OPERACION -->

<div class="section">

<h2>
⚙️ Operación del Día
</h2>

<select id="regimen">

<option value="">
Selecciona régimen
</option>

<option value="PFAE">
PFAE
</option>

<option value="SUSA">
SUSA
</option>

<option value="RESICO">
RESICO
</option>

<option value="PLADIG">
PLADIG
</option>

<option value="RIF">
RIF
</option>

</select>

<select id="operacion">

<option value="">
Selecciona operación
</option>

<option value="Distribucion">
Distribución
</option>

<option value="Venta">
Venta
</option>

<option value="Instalacion">
Instalación
</option>

<option value="Servicio">
Servicio
</option>

</select>

<div id="modoActual"></div>

<div id="modulosActivos"></div>

</div>

<!-- BOTONES -->

<div class="actions">

<div class="action save"
onclick="guardarModo()">
💾 Guardar
</div>

<div class="action edit">
✏️ Editar
</div>

<div class="action clear"
onclick="limpiarModo()">
🗑️ Limpiar
</div>

<div class="action excel">
📤 Excel
</div>

</div>

<script>

function guardarModo(){

const regimen =
document.getElementById(
'regimen'
).value;

const operacion =
document.getElementById(
'operacion'
).value;

const alerta =
document.getElementById(
'alerta'
);

if(!regimen || !operacion){

alerta.style.display =
'block';

alerta.innerText =
'Selecciona régimen y operación';

return;

}

localStorage.setItem(
'regimenDia',
regimen
);

localStorage.setItem(
'operacionDia',
operacion
);

mostrarContexto();

alerta.style.display =
'block';

alerta.innerText =
'Modo operativo guardado';

}



function mostrarContexto(){

const regimen =
localStorage.getItem(
'regimenDia'
);

const operacion =
localStorage.getItem(
'operacionDia'
);

document.getElementById(
'modoActual'
).innerHTML = `

<h3>
🔥 Modo principal del día
</h3>

<div class="tag">
${regimen}
</div>

<div class="tag">
${operacion}
</div>

`;



let html = '';



if(regimen === 'SUSA'){

html += `

<div class="tag">
🏨 Hotel
</div>

<div class="tag">
🍽️ Alimentos
</div>

<div class="tag">
🚕 Transporte
</div>

<div class="tag">
🧾 Apoyo gasolina
</div>

`;

}



if(regimen === 'PFAE'
&& operacion === 'Distribucion'){

html += `

<div class="tag">
⛽ Gasolina
</div>

<div class="tag">
🅿️ Estacionamiento
</div>

<div class="tag">
📍 Rutas
</div>

<div class="tag">
🛠️ Mantenimiento
</div>

`;

}



if(regimen === 'PFAE'
&& operacion === 'Venta'){

html += `

<div class="tag">
📦 Inventario
</div>

<div class="tag">
💰 Venta
</div>

<div class="tag">
🧾 Ticket
</div>

`;

}



if(regimen === 'PFAE'
&& operacion === 'Instalacion'){

html += `

<div class="tag">
🔧 Mano de obra
</div>

<div class="tag">
🪛 Herramienta
</div>

<div class="tag">
⏱️ Tiempo servicio
</div>

`;

}



document.getElementById(
'modulosActivos'
).innerHTML = html;

}



function limpiarModo(){

localStorage.removeItem(
'regimenDia'
);

localStorage.removeItem(
'operacionDia'
);

location.reload();

}



window.onload = ()=>{

mostrarContexto();

}

</script>

</body>
</html>
