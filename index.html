<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Fiscal Core</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#07111f;
color:white;
padding:12px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.status-bar{
display:flex;
gap:8px;
align-items:center;
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
background:#4b5563;
}

.status-ok{
background:#10b981;
box-shadow:0 0 10px #10b981;
}

.status-alert{
background:#3b82f6;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:.2;}
100%{opacity:1;}
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.card{
background:#132238;
padding:10px;
border-radius:18px;
height:85px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:.2s;
cursor:pointer;
opacity:.35;
filter:grayscale(100%);
}

.card.active{
opacity:1;
filter:grayscale(0%);
transform:scale(1.03);
box-shadow:0 0 18px rgba(16,185,129,.4);
}

.card span{
font-size:28px;
margin-bottom:5px;
}

.card h3{
font-size:13px;
}

.section{
background:#132238;
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

input,
select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:10px;
background:#1b2f4a;
color:white;
font-size:14px;
outline:none;
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#10b981;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🚀 Micro Fiscal Core</div>
<div class="status-bar">
<div class="status-dot status-ok"></div>
<div class="status-dot"></div>
<div class="status-dot status-alert"></div>
</div>
</div>

<div class="grid">
<div class="card active" onclick="activar(this)">
<span>💰</span>
<h3>Ingresos</h3>
</div>

<div class="card" onclick="activar(this)">
<span>💸</span>
<h3>Gastos</h3>
</div>

<div class="card" onclick="activar(this)">
<span>📝</span>
<h3>Registro</h3>
</div>

<div class="card" onclick="activar(this)">
<span>🛠️</span>
<h3>Mantenimiento</h3>
</div>
</div>

<div class="section" id="contenido"></div>

<script>

let regimenFiscal = localStorage.getItem("regimenFiscal") || "Asalariado";

function activar(elemento){

const cards = document.querySelectorAll('.card');

cards.forEach(card=>{
card.classList.remove('active');
});

elemento.classList.add('active');

const titulo = elemento.innerText.trim();

const contenido = document.getElementById('contenido');


if(titulo.includes('Ingresos')){

contenido.innerHTML = `
<h2>💰 Ingresos</h2>

<input type="text" placeholder="Concepto ingreso">

<input type="number" placeholder="Monto">

<select id="regimenSelect">

<option value="Asalariado" ${regimenFiscal === "Asalariado" ? "selected" : ""}>
👨‍💼 Asalariado
</option>

<option value="Actividad Empresarial" ${regimenFiscal === "Actividad Empresarial" ? "selected" : ""}>
🏢 Actividad Empresarial
</option>

</select>

<button onclick="guardarRegimen()">
💾 Guardar Régimen
</button>
`;
}


else if(titulo.includes('Gastos')){

if(regimenFiscal === "Asalariado"){

contenido.innerHTML = `
<h2>🚚 Viáticos</h2>

<input type="text" placeholder="Concepto">

<input type="number" placeholder="Monto">

<select id="tipoViatico" onchange="mostrarCamposViaticos()">

<option value="Gasolina">⛽ Gasolina</option>
<option value="Hotel">🏨 Hotel</option>
<option value="Alimentos">🍔 Alimentos</option>
<option value="Lavanderia">🧺 Lavandería</option>
<option value="Transporte">🚕 Transporte</option>
<option value="Pasajes">🚌 Pasajes</option>
<option value="Casetas">🛣️ Casetas</option>
<option value="Propinas">💵 Propinas</option>
<option value="Otros">📦 Otros</option>

</select>

<div id="camposViaticoGasolina" style="display:none;">

<input type="number" placeholder="Litros gasolina">
<input type="number" placeholder="Total cargado">
<input type="number" placeholder="$/Litro">
<input type="number" placeholder="Odómetro actual">

</div>

<button>
💾 Guardar Viático
</button>
`;

mostrarCamposViaticos();
}

else{

contenido.innerHTML = `
<h2>💸 Gastos Operativos</h2>

<input type="text" placeholder="Concepto gasto">

<input type="number" placeholder="Monto">

<select id="tipoGasto" onchange="mostrarCamposGasolina()">

<option value="Gasolina">⛽ Gasolina</option>
<option value="Insumos">📦 Insumos</option>
<option value="Herramientas">🔧 Herramientas</option>
<option value="Logistica">🚚 Logística</option>
<option value="Mantenimiento">🛠️ Mantenimiento</option>
<option value="Otros">📁 Otros</option>

</select>

<div id="gasolinaCampos" style="display:none;">

<input type="number" placeholder="Total cargado">
<input type="number" placeholder="$/Litro">
<input type="number" placeholder="Odómetro actual">

</div>

<button>
💾 Guardar Gasto
</button>
`;

mostrarCamposGasolina();
}
}


else if(titulo.includes('Registro')){

contenido.innerHTML = `
<h2>📝 Registro Fiscal</h2>

<select id="regimenRegistro">

<option value="Asalariado" ${regimenFiscal === "Asalariado" ? "selected" : ""}>
👨‍💼 Asalariado
</option>

<option value="Actividad Empresarial" ${regimenFiscal === "Actividad Empresarial" ? "selected" : ""}>
🏢 Actividad Empresarial
</option>

</select>

<button onclick="guardarRegimenRegistro()">
💾 Guardar Régimen
</button>
`;
}


else if(titulo.includes('Mantenimiento')){

contenido.innerHTML = `
<h2>🛠️ Mantenimiento</h2>

<select>
<option>🛞 Balatas</option>
<option>🛢️ Aceite</option>
<option>🛞 Llantas</option>
<option>🔩 Suspensión</option>
<option>🔋 Batería</option>
<option>⚙️ Afinación</option>
<option>🚗 Frenos</option>
</select>

<input type="number" placeholder="Kilometraje actual">
<input type="number" placeholder="Costo pieza">
<input type="number" placeholder="Mano de obra">

<button>
💾 Guardar Mantenimiento
</button>
`;
}
}


function guardarRegimen(){

const select = document.getElementById('regimenSelect');

regimenFiscal = select.value;

localStorage.setItem("regimenFiscal", regimenFiscal);

alert("Régimen guardado: " + regimenFiscal);
}


function guardarRegimenRegistro(){

const select = document.getElementById('regimenRegistro');

regimenFiscal = select.value;

localStorage.setItem("regimenFiscal", regimenFiscal);

alert("Régimen actualizado: " + regimenFiscal);
}


function mostrarCamposGasolina(){

const tipo = document.getElementById('tipoGasto');
if(!tipo) return;

const campos = document.getElementById('gasolinaCampos');

if(tipo.value === "Gasolina"){
campos.style.display = "block";
}else{
campos.style.display = "none";
}
}


function mostrarCamposViaticos(){

const tipo = document.getElementById('tipoViatico');
if(!tipo) return;

const campos = document.getElementById('camposViaticoGasolina');

if(tipo.value === "Gasolina"){
campos.style.display = "block";
}else{
campos.style.display = "none";
}
}

activar(document.querySelector('.card.active'));

</script>

</body>
</html>
```
