<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micro Fiscal Core</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#07111f;
color:white;
padding:12px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.status-bar{
display:flex;
gap:8px;
align-items:center;
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
background:#4b5563;
}

.status-ok{
background:#10b981;
box-shadow:0 0 10px #10b981;
}

.status-alert{
background:#3b82f6;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:.2;}
100%{opacity:1;}
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.card{
background:#132238;
padding:10px;
border-radius:18px;
height:85px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:.2s;
cursor:pointer;
opacity:.35;
filter:grayscale(100%);
}

.card.active{
opacity:1;
filter:grayscale(0%);
transform:scale(1.03);
box-shadow:0 0 18px rgba(16,185,129,.4);
}

.card span{
font-size:28px;
margin-bottom:5px;
}

.card h3{
font-size:13px;
}

.tools{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.tool{
background:#132238;
padding:10px;
border-radius:18px;
height:75px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-size:12px;
opacity:.4;
filter:grayscale(100%);
transition:.2s;
}

.tool.active{
opacity:1;
filter:grayscale(0%);
}

.tool span{
font-size:24px;
margin-bottom:5px;
}

.section{
background:#132238;
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

.section h2{
margin-bottom:15px;
font-size:20px;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:10px;
background:#1b2f4a;
color:white;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#374151;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button.ready{
background:#10b981;
box-shadow:0 0 15px rgba(16,185,129,.5);
}

.actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.action{
padding:14px;
border-radius:16px;
text-align:center;
font-weight:bold;
font-size:14px;
opacity:.5;
filter:grayscale(100%);
transition:.2s;
}

.action.active{
opacity:1;
filter:grayscale(0%);
}

.save{
background:#10b981;
}

.edit{
background:#3b82f6;
}

.delete{
background:#ef4444;
}

.excel{
background:#15803d;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
🚀 Micro Fiscal Core
</div>

<div class="status-bar">
<div class="status-dot status-ok"></div>
<div class="status-dot"></div>
<div class="status-dot status-alert"></div>
</div>

</div>

<div class="grid">

<div class="card active" onclick="activar(this)">
<span>💰</span>
<h3>Ingresos</h3>
</div>

<div class="card">
<span>💸</span>
<h3>Gastos</h3>
</div>

<div class="card">
<span>📊</span>
<h3>Estimado</h3>
</div>

<div class="card">
<span>🧾</span>
<h3>IVA</h3>
</div>

<div class="card">
<span>📝</span>
<h3>Registro</h3>
</div>

<div class="card">
<span>👥</span>
<h3>Clientes</h3>
</div>

<div class="card">
<span>🚚</span>
<h3>Viáticos</h3>
</div>

<div class="card">
<span>🗺️</span>
<h3>Rutas</h3>
</div>

</div>

<div class="tools">

<div class="tool active">
<span>📷</span>
OCR
</div>

<div class="tool">
<span>🔳</span>
QR
</div>

<div class="tool">
<span>📦</span>
Código
</div>

<div class="tool">
<span>☁️</span>
Nube
</div>

</div>

<div class="section">

<h2>⛽ Nuevo Movimiento</h2>

<input type="text" placeholder="Concepto">

<input type="number" placeholder="Monto">

<input type="number" placeholder="Litros gasolina">

<input type="number" placeholder="Odómetro">

<select>
<option>Ingreso</option>
<option>Gasto</option>
</select>

<button class="ready">
💾 Guardar Movimiento
</button>

</div>

<div class="actions">

<div class="action save active">
💾 Guardar
</div>

<div class="action edit">
✏️ Editar
</div>

<div class="action delete">
🗑️ Borrar
</div>

<div class="action excel">
📤 Excel
</div>

</div>

</body>
</html>
